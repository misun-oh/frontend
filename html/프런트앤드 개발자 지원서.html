<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프런트엔드 개발자 지원서</title>
</head>
<body>
<h1>프런트엔드 개발자 지원서</h1>
<!--
action : 요청할 페이지 주소 
          비어 있는경우 자기자신을 다시 요청

-->
<form action="" method="get">
<p>HTML, CSS, Javascript에 대한 기술적 이해와 경험이 있는 분을 찾습니다.</p>

<hr>

<p><b>개인정보</b></p>
<ul>
    <!--
    ?name=오미선&tel=01022223333
    name속성의값=value속성의값
    -->
    <li>이름<input type="text" placeholder="공백없이 입력하세요" name="name" value="오미선"></li>
    <li>연락처<input type="tel" name="tel"></li>
</ul>
<!--name : 서버에 데이터를 넘길때-->

<p><b>지원 분야</b></p>
 <ul>
    <li><input type="radio" name="field" id="" value="1">웹 퍼블리싱</li>
    <li><input type="radio" name="field" id="" value="2">웹 애플리케이션 개발</li>
    <li><input type="radio" name="field" id="" value="3">개발 환경 개선</li>
 </ul>
 
 
<p><b>지원동기</b></p>
<textarea cols="60" rows="5" name="motive" id="" placeholder="본사 지원 동기를 간략히 써 주세요."></textarea>
<br>
<button type="">접수하기</button>
<button type="reset">다시쓰기</button>
</form>
</body>
</html>
