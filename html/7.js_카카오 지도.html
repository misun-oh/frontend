    <h1>카카오 지도</h1>
    <h3>https://apis.map.kakao.com/web/</h3>
    <h4>JavaScript SDK로 카카오 API를 호출하려면 앱 관리 페이지의 [앱] > [플랫폼 키] > [JavaScript 키] > [JavaScript SDK 도메인]에 도메인을 등록해야 합니다. JavaScript 키를 참고합니다.</h4>
    <h3>위도 경도 확인하기</h3>
    <h4>
        <img width="60%" src="img/google_map.png" alt="구글지도">
        <P>구글지도 > 위도/경도를 확인하고 싶은 곳 >  마우스 우클릭 > 
        출발지로 지정 </P>
        <ul>
            <li>1. 주소표시줄에서 위도/경도를 확인 후 중심좌표를 변경</li>
            <li>2. 마커 표시하기</li>
            <li>3. 인포윈도우 표시하기</li>

        </ul>
        
        
        
    </h4>
    <hr>
    <div id="map" style="width:500px;height:400px;"></div>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=e8542170f7ef9349e713e142fd9d3ab2"></script>





    <script>
        var container = document.getElementById('map'); //지도를 담을 영역의 DOM 레퍼런스
        var options = { //지도를 생성할 때 필요한 기본 옵션
            center: new kakao.maps.LatLng(37.4789631, 126.8785616), //지도의 중심좌표.
            level: 3 //지도의 레벨(확대, 축소 정도)
        };

        var map = new kakao.maps.Map(container, options); //지도 생성 및 객체 리턴

        // 마커가 표시될 위치입니다 
        var markerPosition  = new kakao.maps.LatLng(37.4789631, 126.8785616); 

        // 마커를 생성합니다
        var marker = new kakao.maps.Marker({
            position: markerPosition
        });

        // 마커가 지도 위에 표시되도록 설정합니다
        marker.setMap(map);

        var iwContent = '<div style="padding:5px;">Hello World! <br><a href="https://map.kakao.com/link/map/Hello World!,33.450701,126.570667" style="color:blue" target="_blank">가산 영화관</a> <a href="https://map.kakao.com/link/to/Hello World!,33.450701,126.570667" style="color:blue" target="_blank">길찾기</a></div>', // 인포윈도우에 표출될 내용으로 HTML 문자열이나 document element가 가능합니다

        iwPosition = [new kakao.maps.LatLng(37.4789631, 126.8785616),]
        
        //new kakao.maps.LatLng(37.4789631, 126.8785616); //인포윈도우 표시 위치입니다

        // 인포윈도우를 생성합니다
        var infowindow = new kakao.maps.InfoWindow({
            position : iwPosition, 
            content : iwContent 
        });
        // 마커 위에 인포윈도우를 표시합니다. 두번째 파라미터인 marker를 넣어주지 않으면 지도 위에 표시됩니다
        infowindow.open(map, marker);
    </script>
</body>


</html>
