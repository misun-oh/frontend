<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        console.log("head태그", document.querySelector("h1"));
    </script>
</head>
<body>
    <h1>자바스크립트</h1>
    <!-- 
    위치
    스크립트가 실행되기전에 화면에 요소가 그려져야 요소를 선택할수 있다!!! 
    -->
    <script>
        // 한줄 주석
        /*
        여러줄 주석
        여러줄
        */
        // 콘솔창에 출력 -> F12 개발자 도구의 콘솔창에 내용이 출력 됩니다.    
        console.log("안내", "콘솔창에 출력해봅시다")

        // 선택자를 화면에 있는 요소를 선택하는 방법
        // document.querySelector("선택자")
        console.log("body태그 상단", document.querySelector("h1"));

        // 스크립트 실행순서가 중요한 이유
        // 변수 선언 / 변수에 값을 할당 / + 연산자의 특징 
        // 타입확인 / 형변환 

        // 변수명 = 값(리터럴); 
        // 변수의 타입은 리터럴에 의해서 결정된다
        // 지정된 값에 따라서 타입이 결정되는 언어
        // 변수 사용 : 변수이름을 불러준다!!!!!
        // var, let, const
        // var : 함수단위의 유효 범위, 재선언 - 위험, 재할당 가능
        var a=1; var b=2; var a=3;
        // 블록{}단위의 스코프, 재선언 불가능, 재할당 가능
        let c=1; c=2; 
        // let c=100; <-- 재선언 불가능
        const d=1; 
        // d=2; <-- 재할당 불가능
        
        // 키워드 없이 변수를 만들면 전역변수(어디서나 사용 가능)
        e="전역변수"

        // 타입을 확인하는 방법
        typeof(a)
        typeof("테스트") // 문자열인 경우, "", '' 안에 작성 해야 한다!!!! -> 오류발생

        // 자료형 : 리터럴에 의해 결정
        // 문자열, 숫자, boolean, function, object
        // boolean : 참(true)과 거짓(false)을 나타냄
        // 주로 비교연산자에 의해 나온값(결과)
        // ==, >=, <=, !=
        // === 타입까지 비교 할때

        let name='이름';
        // 화면에 있는 요소를 변수에 저장
        let h1 = document.querySelector("h1");
        // innerText : 요소의 시작태그와 끝태그 사이의 컨텐츠를 변경
        h1.innerText = name;

        /* 
        제어문 (if/switch) / 반복문 (for/while/do-while)
        
        제어문 : 조건에 따라 코드블럭{} 을 실행
        
        조건식의 결과는 boolean타입 이므로 
        조건문 안에 boolean타입의 값(true, false)을 작성 가능

        if(조건문){
            조건이 참이면 실행
        }

        if(조건문){
            조건이 참이면 실행
        } else {
            조건이 거짓이면 실행
        }

        if(조건문){
            조건이 참이면 실행
        } else if(조건문) {
            조건이 참이면 실행
        } else {
            조건이 거짓이면 실행 
        }


        */

        if(true){
            console.log("조건문이 참이면 실행!!!")
        }

        if(1==2){
            console.log("조건문이 참이면 실행!!!")
        }
        // 9.0 이상 이면 명작
        // 7.0 볼만함
        // 그외 비추
        let rating = 9.0;
        if(rating >= 9.0){
            console.log("명작");
        } else if(rating >= 7.0){
            console.log("볼만함")
        } else {
            console.log("비추")
        }

        // prompt(매개변수,파라메터) 
        // prompt : 웹 브라우져로 부터 사용자의 입력을 받아 올때 사용
        // 사용자의 입력값을 반환
        // 반환값을 변수에 저장
        let kor = 90;// prompt('국어시험 점수');
        let eng = 88;
        let avg = (kor+eng)/2;

        console.log(kor);
        /* 
        1. 제어문 연습 
        점수를 학점으로 변환해서 출력
            >= 90 A
            >= 80 B
            >= 70 C
            >= 60 D
            아니면 F
        */
        if(kor>=90){
            console.log("A학점 입니다.")
        } else if(kor>=80){
            console.log("B학점 입니다.")
        } else if(kor>=70){
            console.log("C학점 입니다.")
        } else if(kor>=60){
            console.log("D학점 입니다.")
        } else {
            console.log("F학점 입니다.")
        }
        /*
        2. 조건을 여러개 주는 방법( 논리연산자 && || ! )

            논리연산자 : 주어진 조건들의 참과 거짓을 판별
            && 그리고 
            || 또는
            ! 부정 연산자

            평균을 구해서 합격/불합격 
            영어시험, 국어시험의 평균이 80 이상 이면 합격
            과목별 40이하는 불합격
        */
        if( kor > 40 && eng > 40 && avg >= 80){
            // 변수 출력하는 방법 
            // `` 백팃안에 문자열과 변수를 함께 작성 할  수 있다
            // `${변수명}`
            console.log(`${avg} 합격 입니다.`);
        } else {
            console.log(avg + " 불합격 입니다.");
        }

        /*
        3. 삼항 연산자
        조건 ? 참일때 반환값 : 거짓일때 반환값
        */
        let res = (kor >= 90) ? "합격" : "불합격";
        console.log(`${kor}은 ${res} 입니다.`)

        /*
            😀falsy한 값
            조건문에서 데이터가 유효한지 검사할때 사용
            
            js 조건문 에서 false로 평가 받는 값
            false, 0, "", null, undefined, NaN
        */
        if(kor){
            console.log("falsy하지 않은 값은 true로 처리돼요");
        }

    </script>
    <!-- 자바스크립트 외부문서를 연결하는 방법 -->
    <script src="/js/main.js"></script>
</body>
</html>
