<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    <h1>객체</h1>
    <!-- 화면에 있는 요소를 스크립트로 선택할때 
        요소가 만들어지기 전에 스크립트에서 요소를 선택 할 경우 오류가 발생!!!! -->
    <h1>로또 생성기</h1>
    <button class="lotto_btn">로또 생성</button>
    <div class="box"></div>

    <script>

        /*
        변수 선언 : 변수만 만든상태 let a
        변수 초기화 : 변수에 값을 넣은 상태 a=10
        */
        /*
        titles 배열에 서로 다른 영화 제목 6개를 담는다
        ratings 배열에 각 영화의 평점 6개를 같은 순서로 담는다 (그중 1개는 null — 개봉 예정작)
        for문으로 `제목 - 평점` 형태로 6줄을 출력한다 (null이면 삼항연산자로 "개봉 예정" 표시)
        */
        const titles  = ["도시의 밤", "파랑의 계절", "스텔라 오디세이",
                         "마지막 항해", "여름의 문", "은하수 특급"];
        const ratings = [9.8, 9.5, 9.2, 9.0, 8.7, null];

        titles.forEach(
            // 배열의 요소들을 순회하면서 (0번부터 끝까지)
            // 배열이 가지고 있는 요소의 값, 배열이 가지고 있는 요소의 방번호
            (item, idx)=>{
                // `` 백팃 - 변수를 출력, 줄바꿈 출력

                // 삼항연산자 - 제어문을 간단하게 작성
                // 조건?참:거짓
                let rating = ratings[idx] == null ? "개봉 예정" :  ratings[idx];
                //console.log(`${item} - ${ratings[idx]}`)
                //console.log(`${item} - ${ratings[idx] == null ? "개봉 예정" :  ratings[idx]}`)
                console.log(`${item} - ${rating}`);


            }
        )

        // 호이스팅 : 자바스크립트는 코드를 실행하기 전에 선언부를 먼저 훑어 메모리에 등록 
        // 함수의 호이스팅 : 함수 자체가 끌어올려짐
        // 변수의 호이스팅 : 변수의 선언부가 끌어올려짐
        run(()=>{});

        // 함수는 그냥 실행되 않는다
        // 이름에 괄호를 불러줘야 실행된다 
        // -> 이름() -> 함수에 매개변수를 전달해서 함수를 실행
        
        // 익명의 함수 : 이름이 없으니까 변수에 저장해서 사용한다
        let sayDone = () => {
            console.log("작업이 완료 되었습니다.");
        }
        sayDone

        // 함수를 작성할때 매개변수에 초기값을 지정할 수 있다
        function run(callback=sayDone) {
            console.log(callback);
            callback();
        }

        // 함수를 매개변수로 전달 하는 방법!!!!
        // 1. 익명의 함수로 전달
        run(
            ()=>{
                console.log("작업이 완료 되었습니다.");
            }
        )

        // 2. 변수로 전달
        // 😀 주의 ! sayDone() -> 함수의 실행결과 -> undefined
        //run(sayDone());
        run(sayDone);
        

        

        // lotto_btn : 스네이크 표기법
        // lottoBtn : 카멜 표기법
        let lotto_btn = document.querySelector(".lotto_btn");

        lotto_btn.addEventListener( 'click' ,
            function () {
                make_lotto();
            }
        );


        // 로또를 만들고 출력하는 기능
        function make_lotto(){
            /* 
            로또 만들기
            1. 무작위수 추출
                Math.random() : 0 ~ 1 사이의 무작위 수를 추출 
                범위를 잡아준다 (* 범위 + 1)
            2. 배열에 저장할 경우 중복이 발생하는 문제가 있음
            3. Set : 중복 허용 하지 않음!
            4. 6개의 임의의 수를 추출해서 저장하고 출력하세요
            */
            let lotto = new Set();
            // lotto.size : 요소의 갯수
            // while ( 조건 ) : 조건이 참이면 실행
            // lotto.size < 6
            while(true){
                // 형변환 parseInt : 정수부분만 추출
                let num = parseInt( Math.random() * 47 + 1 ) 
                lotto.add(num);
                // break를 이용해서 탈출
                
                if(lotto.size == 6) {
                    break;
                }
            }

            // 로또번호를 화면에 출력
            console.log("box", document.querySelector(".box") );
            // querySelector : 선택자를 이용해서 화면에 있는 요소를 1개 선택
            let box = document.querySelector(".box");
            lotto.forEach(
                (item, idx)=>{
                    console.log(item);
                    box.innerHTML += item + " ";
                }
            );
            // 반복문이 끝나면 줄바꿈
            box.innerHTML += "<br>";


        }
        
    </script>
    

</body>
</html>
