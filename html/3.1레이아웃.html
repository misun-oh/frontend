<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>레이아웃</title>
        <style>
        *{
         box-sizing: border-box;
         margin: 0px;
        }
        header{
            width: 100%;
            height: 400px;
            background-color: #eee;

        }
        main{
            width: 100%;
            /* vh : 창의 높이, vw: 창의 너비 */
            height: 70vh;
            background-color: bisque;
        }
        footer{
            width: 100%;
            height:200px;
            background-color: beige;
        }

        .container{
            width: 80%;
            margin: 0 auto;
        }
        .banner{
            height: 30px;
            line-height: 30px;
            background-color: black;
            color: white;
            text-align: center;
            /* 16px */
            font-size: 0.8rem;
            font-weight: 600;

        }
        .flexbox{
            display: flex;
            justify-content: end;
        }
        .quickmenu_item{
            width: 100px;
            display: inline-block;
        }

        ul{
            list-style: none;
        }
        a{
            text-decoration: none;
            color: #333;
        }
        .top_quickmenu a{
            padding: 20px 20px;
        }
        .logo_item{
            text-align: right;
            font-size: 1.2rem;
            height: 100px;
            /* flex로 변환하고 가운데 정렬 */
            align-items: center;

        }
        .logo_item i{
            padding: 20px 10px;
        }

        .logo_item span:first-child{
            border: 1px solid ;
            border-radius: 20px;
            padding-left: 5rem;
            height: 40px;
            line-height: 40px;
            margin-right: 20px;
        }
        .logo{
            border: 1px solid red;
            
            background: url(https://comebello.com/web/upload/NNEditor/20251121/f6cff70867a8a89ab7705c3b1036d3ec.png) no-repeat center;
        }
        
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>
<div class="container">
    <!--헤더 : 로고 퀵메뉴 메뉴-->
    <header>
        <div class="banner">🚗 당일 배송</div>
        <div class="top_quickmenu flexbox">
            <a href="">로그인</a>
            <a href="">회원가입</a>
            <a href="">마이샵</a>
            <a href="">커뮤니티</a>
            <a href=""><img src="https://img.cafe24.com/img/common/global/ko_KR_18x12.png" alt=""> KR</a>
        </div>
        
        <div class="top_quickmenu">
            <ul class="flexbox">
                <li class="quickmenu_item">로그인</li>
                <li class="quickmenu_item">회원가입</li>
                <li class="quickmenu_item">마이샵</li>
                <li class="quickmenu_item">커뮤니티</li>
                <li class="quickmenu_item">KR</li>
            </ul>
        </div>

        <div class="logo">
            <div class="logo_item flexbox">
                <span><i class="bi bi-search"></i></span>
                <span><i class="bi bi-box-arrow-in-left"></i></span>
                <span><i class="bi bi-cart"></i></span>
                <span><i class="bi bi-arrow-clockwise"></i></span>
            </div>
        </div>


    </header>
    <!-- 메인 : 서비스 되는 컨텐츠-->
    <main></main>
    <!-- footer-->
    <footer></footer>





</div>
</body>
</html>
